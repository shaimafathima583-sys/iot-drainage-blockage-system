<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IoT Drainage Monitoring Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>IoT Drainage Blockage Monitoring System</h1>
  <div class="card-container">
    <div class="card">Water Level: <span id="water">--</span></div>
    <div class="card">Blockage Status: <span id="blockage">--</span></div>
    <div class="card">Motor Status: <span id="motor">--</span></div>
  </div>
  <div class="alerts">
    <h2>Alerts</h2>
    <ul id="alertList"></ul>
  </div>
  <button id="simulateBtn">Simulate Blockage</button>
  <script src="script.js"></script>
</body>
</html>
